{% set name = "altair" %}
{% set version = "6.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 614bf5ecbe2337347b590afb111929aa9c16c9527c4887d96c9bc7f6640756b4

build:
  number: 1
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - typing_extensions >=4.12.0  # [py<315]
    - jinja2
    - jsonschema >=3.0
    - packaging
    - narwhals >=1.27.1
  run_constrained:
    - vl-convert-python >=1.8.0
    - pandas >=1.1.3
    - pyarrow >=11
    - vegafusion >=2.0.3
    - anywidget >=0.9.0
    - altair_tiles >=0.3.0

test:
  imports:
    - altair
    - altair.expr
    - altair.utils
    - altair.vegalite
  source_files:
    - altair
  requires:
    - docutils
    - ipython
    - pip
    - pytest
    - sphinx
    - vega_datasets
    # TODO: anywidget is not available on win-64 for py314.
    - anywidget  # [unix]
    # TODO: polars is not available on the main channel for py314. We should add it back when it is available.
    - polars  # [py<314]
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv --pyargs --doctest-modules altair  # [py<314 and unix]

about:
  home: https://github.com/vega/altair
  dev_url: https://github.com/vega/altair
  doc_url: https://altair-viz.github.io
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: A declarative statistical visualization library for Python
  description: |
    A declarative statistical visualization library for Python.


extra:
  recipe-maintainers:
    - ellisonbg
    - jakevdp
